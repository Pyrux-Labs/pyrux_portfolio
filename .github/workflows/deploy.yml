name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main # Cambia a 'master' si tu rama principal tiene ese nombre
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: pyrux_portfolio/package-lock.json

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Install dependencies
              working-directory: ./pyrux_portfolio
              run: npm ci

            - name: Build with Next.js
              working-directory: ./pyrux_portfolio
              run: npm run build

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./pyrux_portfolio/out

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
